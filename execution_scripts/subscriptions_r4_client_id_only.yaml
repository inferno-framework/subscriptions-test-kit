sessions:
  - suite: subscriptions_r5_backport_r4_client
    preset: inferno-subscriptions_r5_backport_r4_client_id_only

comparison_config:
  normalized_strings:
    - replacement: <INFERNO_HOST>
      patterns:
        - http://localhost:4567
    - replacement: <UUID>
      pattern: /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i

steps:
  - status: created
    start_run:
      runnable: suite
    action_description: Start full client suite

  - status: waiting
    last_completed: 1.1.01
    command: bundle exec ruby execution_scripts/client_interaction.rb '{wait_outputs.confirmation_url}' id-only
    action_description: Start notification listener, POST id-only Subscription, advance interaction wait

  - status: waiting
    last_completed: 1.3.04
    command: curl -s '{wait_outputs.attest_true_url}'
    action_description: Attest that event notification was processed correctly

  - status: done
    last_completed: suite
    action: END_SCRIPT
    action_description: Script complete
